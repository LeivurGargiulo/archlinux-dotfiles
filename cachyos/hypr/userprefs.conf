# ╔══════════════════════════════════════════════════════════════╗
# ║  userprefs.conf — overrides de leivur sobre HyDE              ║
# ║  Dark glossy glass · Monochrome                              ║
# ╠══════════════════════════════════════════════════════════════╣
# ║  HyDE carga este archivo AL FINAL, así que todo lo de acá    ║
# ║  pisa los defaults de HyDE y del tema. No edita archivos     ║
# ║  que HyDE administra (themes/, hyde.conf), así que sobrevive ║
# ║  a updates y a cambios de tema.                              ║
# ╚══════════════════════════════════════════════════════════════╝

# ─── INPUT ─────────────────────────────────────────────────────
# Teclado latinoamericano + Caps como Escape (HyDE viene en 'us').
input {
    kb_layout = latam
    kb_options = caps:escape
    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat
    touchpad {
        natural_scroll = false
        disable_while_typing = true
        tap-to-click = true
    }
}

# ─── GLOSSY GLASS LOOK ─────────────────────────────────────────
# Bordes monocromáticos blancos (la firma del estilo). Si querés que
# el tema de HyDE controle los colores del borde, borrá estas 2 líneas.
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 1
    col.active_border = rgba(ffffffff) rgba(ffffff66) 45deg
    col.inactive_border = rgba(ffffff14)
    resize_on_border = true
}

decoration {
    rounding = 8
    active_opacity = 1.0
    inactive_opacity = 0.92
    fullscreen_opacity = 1.0

    shadow {
        enabled = true
        range = 16
        render_power = 3
        color = rgba(00000088)
        color_inactive = rgba(00000044)
    }

    blur {
        enabled = true
        size = 12
        passes = 4
        new_optimizations = true
        ignore_opacity = true
        xray = false
        noise = 0.02
        contrast = 1.0
        brightness = 1.0
        vibrancy = 0.1
        vibrancy_darkness = 0.0
        special = true
    }
}

# ─── GESTURES (Hyprland 0.51+) ─────────────────────────────────
# 3 dedos en horizontal para cambiar de workspace.
gesture = 3, horizontal, workspace

# ─── APPS PROPIAS (override de binds de HyDE) ──────────────────
# Definidos acá para que pisen los binds equivalentes de HyDE.
# Mirá el cheatsheet completo de HyDE con SUPER + / (o SUPER + Slash).
$mainMod = SUPER
bind = $mainMod, E,        exec, thunar
bind = $mainMod SHIFT, E,  exec, kitty -e yazi
bind = $mainMod, B,        exec, firefox

# ─── WINDOW RULES (sintaxis actual de Hyprland 0.55) ───────────
# Diálogos flotantes de apps que usás.
windowrule = float true, match:class ^(nm-connection-editor)$
windowrule = float true, match:class ^(blueman-manager)$
windowrule = float true, match:class ^(pavucontrol)$
windowrule = float true, match:class ^(file-roller)$

# Diálogos de Thunar (progreso/confirmar/renombrar) flotan.
windowrule {
    match:class = ^([Tt]hunar)$
    match:title = ^(.*(Progress|Confirm|Rename|Replace).*)$
    float = true
}
