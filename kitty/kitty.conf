# ╔══════════════════════════════════════════════════════════════╗
# ║  kitty.conf — leivur @ gamdias                              ║
# ║  Dark glass · Monochrome · JetBrainsMono NF                 ║
# ╚══════════════════════════════════════════════════════════════╝

# ─── FONTS ─────────────────────────────────────────────────────
font_family                 JetBrainsMono Nerd Font
bold_font                   JetBrainsMono Nerd Font Bold
italic_font                 JetBrainsMono Nerd Font Italic
bold_italic_font            JetBrainsMono Nerd Font Bold Italic
font_size                   12.5
disable_ligatures           never
font_features               JetBrainsMonoNerdFont-Regular +liga +calt +kern

# ─── CURSOR ────────────────────────────────────────────────────
cursor_shape                beam
cursor_beam_thickness       1.5
cursor_blink_interval       0.6
cursor_stop_blinking_after  0
cursor                      #ffffff
cursor_text_color           #050505

# ─── SCROLLBACK ────────────────────────────────────────────────
scrollback_lines            15000
scrollback_pager            less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
scrollback_pager_history_size  64
wheel_scroll_multiplier     5.0
touch_scroll_multiplier     3.0

# ─── MOUSE ─────────────────────────────────────────────────────
copy_on_select              yes
strip_trailing_spaces       smart
select_by_word_characters   @-./_~?&=%+#
focus_follows_mouse         no
pointer_shape_when_grabbed  arrow
default_pointer_shape       beam
pointer_shape_when_dragging beam
open_url_with               firefox
url_style                   curly
url_color                   #888888
underline_hyperlinks        hover

# ─── PERFORMANCE ───────────────────────────────────────────────
repaint_delay               8
input_delay                 3
sync_to_monitor             yes

# ─── WINDOW ────────────────────────────────────────────────────
remember_window_size        yes
initial_window_width        800
initial_window_height       500
window_border_width         1px
window_margin_width         0
window_padding_width        8
placement_strategy          center
inactive_text_alpha         0.85
hide_window_decorations     yes
resize_debounce_time        0.1
resize_in_steps             yes
confirm_os_window_close     0

active_border_color         #ffffff
inactive_border_color       #333333
bell_border_color           #888888

# ─── TRANSPARENCY / BLUR ───────────────────────────────────────
background_opacity          0.82
background_blur             12
dynamic_background_opacity  no

# ─── COLORS — MONOCHROME ───────────────────────────────────────
foreground                  #e8e8e8
background                  #050505
selection_foreground        #050505
selection_background        #e8e8e8

# Black
color0                      #151515
color8                      #444444
# Red (use gray)
color1                      #555555
color9                      #777777
# Green
color2                      #666666
color10                     #888888
# Yellow
color3                      #5a5a5a
color11                     #999999
# Blue
color4                      #4a4a4a
color12                     #aaaaaa
# Magenta
color5                      #606060
color13                     #bbbbbb
# Cyan
color6                      #707070
color14                     #cccccc
# White
color7                      #d0d0d0
color15                     #f0f0f0

# ─── TABS ──────────────────────────────────────────────────────
tab_bar_edge                bottom
tab_bar_style               powerline
tab_powerline_style         slanted
tab_bar_min_tabs            1
tab_bar_margin_height       0 0
tab_bar_margin_width        0
active_tab_foreground       #ffffff
active_tab_background       #1a1a1a
active_tab_font_style       bold
inactive_tab_foreground     #666666
inactive_tab_background     #0d0d0d
inactive_tab_font_style     normal
tab_bar_background          #050505
tab_title_template          " {index}: {title} "
active_tab_title_template   " {index}: {title}  "

# ─── ADVANCED ──────────────────────────────────────────────────
shell                       zsh
editor                      nvim
close_on_child_death        no
allow_remote_control        yes
listen_on                   unix:/tmp/kitty
update_check_interval       0
startup_session             none
clipboard_control           write-clipboard write-primary read-clipboard-ask read-primary-ask
term                        xterm-kitty

# ─── KEYBINDINGS ───────────────────────────────────────────────
clear_all_shortcuts         no

# Tabs
map Ctrl+Shift+t            new_tab_with_cwd
map Ctrl+Shift+w            close_tab
map Ctrl+Shift+]            next_tab
map Ctrl+Shift+[            previous_tab
map Ctrl+Shift+.            move_tab_forward
map Ctrl+Shift+,            move_tab_backward

# Windows
map Ctrl+Shift+Enter        new_window_with_cwd
map Ctrl+Shift+n            new_os_window_with_cwd
map Ctrl+Shift+q            close_window

# Font size
map Ctrl+equal              change_font_size all +1.0
map Ctrl+minus              change_font_size all -1.0
map Ctrl+0                  change_font_size all 0

# Scroll
map Ctrl+Shift+u            scroll_page_up
map Ctrl+Shift+d            scroll_page_down
map Ctrl+Shift+Home         scroll_home
map Ctrl+Shift+End          scroll_end

# Clipboard
map Ctrl+Shift+c            copy_to_clipboard
map Ctrl+Shift+v            paste_from_clipboard
