# =============================================================================
# kitty/kitty.conf — leivur
# Tema Catppuccin Mocha
# =============================================================================

# -----------------------------------------------------------------------------
# Fuente
# -----------------------------------------------------------------------------
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic

font_size        12.0
adjust_line_height  110%
adjust_column_width 0

# Ligaduras
disable_ligatures never

# -----------------------------------------------------------------------------
# Cursor
# -----------------------------------------------------------------------------
cursor_shape          block
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0

# -----------------------------------------------------------------------------
# Scrollback
# -----------------------------------------------------------------------------
scrollback_lines 10000

# -----------------------------------------------------------------------------
# Mouse
# -----------------------------------------------------------------------------
copy_on_select yes
strip_trailing_spaces smart

# -----------------------------------------------------------------------------
# Performance
# -----------------------------------------------------------------------------
repaint_delay    10
input_delay      3
sync_to_monitor  yes

# -----------------------------------------------------------------------------
# Bell
# -----------------------------------------------------------------------------
enable_audio_bell no
visual_bell_duration 0.0

# -----------------------------------------------------------------------------
# Ventana
# -----------------------------------------------------------------------------
remember_window_size   no
initial_window_width   120c
initial_window_height  32c

window_padding_width   12
window_border_width    1pt
draw_minimal_borders   no

background_opacity     0.92
dynamic_background_opacity no

# -----------------------------------------------------------------------------
# Tabs
# -----------------------------------------------------------------------------
tab_bar_edge            bottom
tab_bar_style           powerline
tab_powerline_style     slanted
tab_title_template      "{index}: {title[:20]}"
active_tab_font_style   bold
inactive_tab_font_style normal

# -----------------------------------------------------------------------------
# Colores — Catppuccin Mocha
# -----------------------------------------------------------------------------
foreground              #CDD6F4
background              #1E1E2E
selection_foreground    #1E1E2E
selection_background    #F5E0DC

# Cursor
cursor                  #F5E0DC
cursor_text_color       #1E1E2E

# URL
url_color               #F5E0DC

# Border de ventana activa/inactiva
active_border_color     #B4BEFE
inactive_border_color   #6C7086
bell_border_color       #F9E2AF

# Colores base (normal)
color0   #45475A
color1   #F38BA8
color2   #A6E3A1
color3   #F9E2AF
color4   #89B4FA
color5   #F5C2E7
color6   #94E2D5
color7   #BAC2DE

# Colores brillantes
color8   #585B70
color9   #F38BA8
color10  #A6E3A1
color11  #F9E2AF
color12  #89B4FA
color13  #F5C2E7
color14  #94E2D5
color15  #A6ADC8

# Tab bar
active_tab_foreground   #1E1E2E
active_tab_background   #CBA6F7
inactive_tab_foreground #CDD6F4
inactive_tab_background #181825
tab_bar_background      #11111B

# Marks
mark1_foreground #1E1E2E
mark1_background #B4BEFE
mark2_foreground #1E1E2E
mark2_background #CBA6F7
mark3_foreground #1E1E2E
mark3_background #74C7EC

# -----------------------------------------------------------------------------
# Keybindings extra
# -----------------------------------------------------------------------------
# Ctrl+Shift+T → nueva tab
# Ctrl+Shift+W → cerrar tab
# Ctrl+Shift+→/← → navegar tabs
# (son los defaults de kitty, no hace falta redefinirlos)

# Copiar/pegar
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
