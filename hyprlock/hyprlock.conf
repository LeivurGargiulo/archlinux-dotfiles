# ╔══════════════════════════════════════════════════════════════╗
# ║  hyprlock.conf — leivur @ gamdias                           ║
# ║  Blurred screenshot · Big clock · Minimal input             ║
# ╚══════════════════════════════════════════════════════════════╝

general {
    disable_loading_bar   = true
    hide_cursor           = true
    grace                 = 0
    no_fade_in            = false
    ignore_empty_input    = false
    text_trim             = true
}

# ─── BACKGROUND ────────────────────────────────────────────────
background {
    monitor    =
    path       = screenshot
    blur_size  = 8
    blur_passes = 4
    noise      = 0.02
    contrast   = 0.85
    brightness = 0.70
    vibrancy   = 0.1
    vibrancy_darkness = 0.0
}

# ─── CLOCK ─────────────────────────────────────────────────────
label {
    monitor   =
    text      = cmd[update:1000] echo "$(date +"%H:%M")"
    color     = rgba(255, 255, 255, 0.95)
    font_size = 88
    font_family = Inter Bold
    position  = 0, 120
    halign    = center
    valign    = center
    shadow_passes = 3
    shadow_size   = 8
    shadow_color  = rgba(0, 0, 0, 0.55)
    shadow_boost  = 1.2
}

# ─── DATE ──────────────────────────────────────────────────────
label {
    monitor   =
    text      = cmd[update:60000] echo "$(date +"%A, %d de %B de %Y")"
    color     = rgba(255, 255, 255, 0.45)
    font_size = 18
    font_family = Inter
    position  = 0, 30
    halign    = center
    valign    = center
    shadow_passes = 2
    shadow_size   = 4
    shadow_color  = rgba(0, 0, 0, 0.45)
}

# ─── INPUT FIELD ───────────────────────────────────────────────
input-field {
    monitor         =
    size            = 280, 48
    outline_thickness = 1
    dots_size       = 0.25
    dots_spacing    = 0.30
    dots_center     = true
    dots_rounding   = -1
    outer_color     = rgba(255, 255, 255, 0.12)
    inner_color     = rgba(0, 0, 0, 0.45)
    font_color      = rgba(255, 255, 255, 0.82)
    fade_on_empty   = true
    fade_timeout    = 1500
    placeholder_text = <span foreground="##888888">Contraseña</span>
    hide_input      = false
    rounding        = 12
    check_color     = rgba(255, 255, 255, 0.80)
    fail_color      = rgba(180, 180, 180, 0.80)
    fail_text       = <i>Contraseña incorrecta ($ATTEMPTS)</i>
    fail_transition = 300
    capslock_color  = rgba(200, 200, 200, 0.90)
    numlock_color   = -1
    bothlock_color  = -1
    invert_numlock  = false
    swap_font_color = false
    position        = 0, -50
    halign          = center
    valign          = center
    shadow_passes   = 2
    shadow_size     = 6
    shadow_color    = rgba(0, 0, 0, 0.45)
}

# ─── USERNAME LABEL ────────────────────────────────────────────
label {
    monitor   =
    text      = leivur
    color     = rgba(255, 255, 255, 0.30)
    font_size = 14
    font_family = Inter
    position  = 0, -110
    halign    = center
    valign    = center
}
