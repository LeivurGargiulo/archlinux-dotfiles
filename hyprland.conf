# =============================================================================
# hyprland.conf — leivur
# =============================================================================

# Monitor (auto-detecta resolución y refresh rate)
monitor=,preferred,auto,1

# Programas por defecto
$terminal    = kitty
$fileManager = thunar
$menu        = wofi --show drun

# -----------------------------------------------------------------------------
# Autostart
# -----------------------------------------------------------------------------
exec-once = waybar
exec-once = dunst
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = nm-applet --indicator
exec-once = blueman-applet

# -----------------------------------------------------------------------------
# Variables de entorno (Wayland)
# -----------------------------------------------------------------------------
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Adwaita
env = QT_QPA_PLATFORM,wayland
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = MOZ_ENABLE_WAYLAND,1
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# -----------------------------------------------------------------------------
# Input
# -----------------------------------------------------------------------------
input {
    kb_layout  = latam
    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll = true
    }
}

# -----------------------------------------------------------------------------
# Apariencia general
# -----------------------------------------------------------------------------
general {
    gaps_in  = 5
    gaps_out = 10
    border_size = 2

    # Gradiente morado → azul (Catppuccin Mocha vibes)
    col.active_border   = rgba(cba6f7ff) rgba(89b4faff) 45deg
    col.inactive_border = rgba(313244aa)

    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 12

    active_opacity   = 1.0
    inactive_opacity = 0.95

    blur {
        enabled  = true
        size     = 6
        passes   = 3
        new_optimizations = true
        xray     = false
        noise    = 0.02
        contrast = 1.1
        brightness = 1.0
        popups   = true
    }

    drop_shadow      = true
    shadow_range     = 12
    shadow_render_power = 3
    col.shadow       = rgba(1a1a2ecc)
}

animations {
    enabled = true

    bezier = smoothOut,  0.36, 0, 0.66, -0.56
    bezier = smoothIn,   0.25, 1, 0.5,  1
    bezier = overshot,   0.05, 0.9, 0.1, 1.05
    bezier = linear,     0.0, 0.0, 1.0, 1.0

    animation = windows,     1, 5,  overshot, slide
    animation = windowsOut,  1, 4,  smoothOut, slide
    animation = windowsMove, 1, 4,  smoothIn
    animation = border,      1, 10, linear
    animation = fade,        1, 5,  smoothIn
    animation = fadeDim,     1, 5,  smoothIn
    animation = workspaces,  1, 6,  overshot, slidevert
}

# -----------------------------------------------------------------------------
# Layout
# -----------------------------------------------------------------------------
dwindle {
    pseudotile        = true
    preserve_split    = true
    smart_resizing    = true
}

master {
    new_is_master = true
}

gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
}

misc {
    force_default_wallpaper = 0   # Deshabilita el wallpaper de anime de Hyprland
    disable_hyprland_logo    = true
    animate_manual_resizes   = true
}

# -----------------------------------------------------------------------------
# Reglas de ventanas
# -----------------------------------------------------------------------------
windowrulev2 = float, class:^(thunar)$, title:^(File Operation*)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(wofi)$
windowrulev2 = center, class:^(wofi)$

# Blur para kitty y waybar
layerrule = blur, waybar
layerrule = blur, wofi
layerrule = ignorezero, wofi

# -----------------------------------------------------------------------------
# Keybindings
# -----------------------------------------------------------------------------
$mainMod = SUPER

# Apps
bind = $mainMod,       Return, exec, $terminal
bind = $mainMod,       E,      exec, $fileManager
bind = $mainMod,       Space,  exec, $menu
bind = $mainMod,       B,      exec, brave

# Ventanas
bind = $mainMod,       Q,      killactive,
bind = $mainMod,       F,      fullscreen, 0
bind = $mainMod SHIFT, F,      fullscreen, 1    # Fullscreen sin bordes
bind = $mainMod,       V,      togglefloating,
bind = $mainMod,       P,      pseudo,          # dwindle
bind = $mainMod,       J,      togglesplit,     # dwindle
bind = $mainMod SHIFT, Q,      exit,

# Foco (vim-style)
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d
bind = $mainMod, H,     movefocus, l
bind = $mainMod, L,     movefocus, r
bind = $mainMod, K,     movefocus, u
bind = $mainMod, J,     movefocus, d

# Mover ventanas
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Mover ventana a workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll por workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# Mover/redimensionar con mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Screenshots (grim + slurp)
bind = ,      Print, exec, grim ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png && notify-send "Screenshot guardado"
bind = SHIFT, Print, exec, grim -g "$(slurp)" ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png && notify-send "Screenshot guardado"
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy && notify-send "Screenshot copiado al clipboard"

# Audio (pipewire / wireplumber)
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Brillo
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Reload config sin reiniciar
bind = $mainMod SHIFT, R, exec, hyprctl reload && notify-send "Hyprland" "Config recargada"
