# ╔══════════════════════════════════════════════════════════════╗
# ║  hyprland.conf — leivur @ gamdias                           ║
# ║  Dark glossy glass · Monochrome · AMD Ryzen 9600X           ║
# ╚══════════════════════════════════════════════════════════════╝

# ─── MONITORS ──────────────────────────────────────────────────
monitor = , preferred, auto, 1

# ─── AUTOSTART ─────────────────────────────────────────────────
exec-once = swww-daemon
exec-once = swww img ~/Pictures/Wallpapers/wallpaper.jpg --transition-type wipe --transition-angle 30 --transition-duration 1.5
exec-once = waybar
exec-once = swaync
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = hypridle
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# ─── ENVIRONMENT ───────────────────────────────────────────────
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Adwaita
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = MOZ_ENABLE_WAYLAND,1
env = _JAVA_AWT_WM_NONREPARENTING,1

# ─── GENERAL ───────────────────────────────────────────────────
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 1
    col.active_border = rgba(ffffffff) rgba(ffffff66) 45deg
    col.inactive_border = rgba(ffffff0f)
    layout = dwindle
    allow_tearing = false
    resize_on_border = true
}

# ─── DECORATION ────────────────────────────────────────────────
decoration {
    rounding = 8
    active_opacity = 1.0
    inactive_opacity = 0.92
    fullscreen_opacity = 1.0

    shadow {
        enabled = true
        range = 16
        render_power = 3
        color = rgba(00000088)
        color_inactive = rgba(00000044)
    }

    blur {
        enabled = true
        size = 12
        passes = 4
        new_optimizations = true
        ignore_opacity = true
        xray = false
        noise = 0.02
        contrast = 1.0
        brightness = 1.0
        vibrancy = 0.1
        vibrancy_darkness = 0.0
        special = true
    }
}

# ─── ANIMATIONS ────────────────────────────────────────────────
animations {
    enabled = true

    bezier = snappy,  0.05, 0.9,  0.1,  1.0
    bezier = overshot, 0.13, 0.99, 0.29, 1.1
    bezier = smooth,  0.25, 1.0,  0.5,  1.0
    bezier = linear,  0.0,  0.0,  1.0,  1.0

    animation = windows,     1, 4,  snappy,  slide
    animation = windowsOut,  1, 3,  smooth,  slide
    animation = windowsMove, 1, 3,  snappy
    animation = border,      1, 8,  linear
    animation = borderangle, 1, 30, linear, loop
    animation = fade,        1, 4,  smooth
    animation = fadeOut,     1, 3,  smooth
    animation = workspaces,  1, 4,  overshot, slidevert
    animation = specialWorkspace, 1, 4, snappy, slidevert
}

# ─── INPUT ─────────────────────────────────────────────────────
input {
    kb_layout = latam
    kb_options = caps:escape
    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat
    touchpad {
        natural_scroll = false
        disable_while_typing = true
        tap-to-click = true
    }
}

# ─── GESTURES ──────────────────────────────────────────────────
gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
    workspace_swipe_distance = 300
    workspace_swipe_invert = true
    workspace_swipe_min_speed_to_force = 30
    workspace_swipe_cancel_ratio = 0.5
}

# ─── MISC ──────────────────────────────────────────────────────
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    vfr = true
    vrr = 0
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
    enable_swallow = true
    swallow_regex = ^(kitty)$
    swallow_exception_regex = ^(wev)$
    focus_on_activate = false
}

# ─── LAYOUT: DWINDLE ───────────────────────────────────────────
dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
    smart_split = false
    smart_resizing = true
}

# ─── WINDOW RULES ──────────────────────────────────────────────
# Float dialogs
windowrulev2 = float, class:^(thunar)$, title:^(File Operation Progress)$
windowrulev2 = float, class:^(thunar)$, title:^(Confirm to replace files)$
windowrulev2 = float, class:^(thunar)$, title:^(.)$, floating:1
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(.blueman-manager-wrapped)$
windowrulev2 = float, class:^(org.gnome.Nautilus)$
windowrulev2 = float, class:^(file-roller)$
windowrulev2 = float, class:^(xdg-desktop-portal-gtk)$
windowrulev2 = float, class:^(polkit-gnome-authentication-agent-1)$

# Wofi — centered, fixed size
windowrulev2 = float, class:^(wofi)$
windowrulev2 = center, class:^(wofi)$
windowrulev2 = size 800 500, class:^(wofi)$
windowrulev2 = animation slide, class:^(wofi)$

# Kitty opacity
windowrulev2 = opacity 0.82, class:^(kitty)$

# Firefox Picture-in-Picture
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = pin, title:^(Picture-in-Picture)$
windowrulev2 = move 73% 72%, title:^(Picture-in-Picture)$

# Swaync
layerrule = blur, swaync-control-center
layerrule = blur, swaync-notification-window
layerrule = ignorezero, swaync-control-center
layerrule = ignorezero, swaync-notification-window

# Waybar
layerrule = blur, waybar
layerrule = ignorezero, waybar

# Wofi layer
layerrule = blur, wofi
layerrule = ignorezero, wofi

# ─── KEYBINDINGS ───────────────────────────────────────────────
$mainMod = SUPER

# Apps
bind = $mainMod, Return,       exec, kitty
bind = $mainMod, Space,        exec, wofi --show drun
bind = $mainMod, E,            exec, thunar
bind = $mainMod SHIFT, E,      exec, kitty -e yazi
bind = $mainMod, B,            exec, firefox
bind = $mainMod, N,            exec, swaync-client -t -sw
bind = $mainMod, C,            exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# Screenshot
bind = , Print,                exec, mkdir -p ~/Pictures/Screenshots && grim ~/Pictures/Screenshots/$(date +%Y-%m-%d_%H-%M-%S).png && notify-send "Screenshot" "Guardado en ~/Pictures/Screenshots"
bind = SHIFT, Print,           exec, mkdir -p ~/Pictures/Screenshots && grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%Y-%m-%d_%H-%M-%S).png && notify-send "Screenshot" "Área guardada"
bind = $mainMod SHIFT, S,      exec, grim -g "$(slurp)" - | wl-copy && notify-send "Screenshot" "Copiado al portapapeles"

# Window management
bind = $mainMod, Q,            killactive
bind = $mainMod, F,            fullscreen, 0
bind = $mainMod SHIFT, F,      fullscreen, 1
bind = $mainMod, V,            togglefloating
bind = $mainMod, P,            pseudo
bind = $mainMod, J,            togglesplit

# System
bind = $mainMod SHIFT, Q,      exit
bind = $mainMod SHIFT, R,      exec, hyprctl reload && notify-send "Hyprland" "Configuración recargada"
bind = $mainMod SHIFT, W,      exec, swww img $(ls ~/Pictures/Wallpapers/*.{jpg,jpeg,png,gif,webp} 2>/dev/null | shuf -n1) --transition-type wipe --transition-angle 30 --transition-duration 1.5

# Lockscreen
bind = $mainMod SHIFT, L,      exec, loginctl lock-session

# Focus — arrows
bind = $mainMod, left,         movefocus, l
bind = $mainMod, right,        movefocus, r
bind = $mainMod, up,           movefocus, u
bind = $mainMod, down,         movefocus, d

# Move windows — arrows
bind = $mainMod SHIFT, left,   movewindow, l
bind = $mainMod SHIFT, right,  movewindow, r
bind = $mainMod SHIFT, up,     movewindow, u
bind = $mainMod SHIFT, down,   movewindow, d

# Resize — Alt+arrows
binde = $mainMod ALT, left,    resizeactive, -40 0
binde = $mainMod ALT, right,   resizeactive, 40 0
binde = $mainMod ALT, up,      resizeactive, 0 -40
binde = $mainMod ALT, down,    resizeactive, 0 40

# Mouse bindings
bindm = $mainMod, mouse:272,   movewindow
bindm = $mainMod, mouse:273,   resizewindow

# Workspaces 1-10
bind = $mainMod, 1,            workspace, 1
bind = $mainMod, 2,            workspace, 2
bind = $mainMod, 3,            workspace, 3
bind = $mainMod, 4,            workspace, 4
bind = $mainMod, 5,            workspace, 5
bind = $mainMod, 6,            workspace, 6
bind = $mainMod, 7,            workspace, 7
bind = $mainMod, 8,            workspace, 8
bind = $mainMod, 9,            workspace, 9
bind = $mainMod, 0,            workspace, 10

bind = $mainMod SHIFT, 1,      movetoworkspace, 1
bind = $mainMod SHIFT, 2,      movetoworkspace, 2
bind = $mainMod SHIFT, 3,      movetoworkspace, 3
bind = $mainMod SHIFT, 4,      movetoworkspace, 4
bind = $mainMod SHIFT, 5,      movetoworkspace, 5
bind = $mainMod SHIFT, 6,      movetoworkspace, 6
bind = $mainMod SHIFT, 7,      movetoworkspace, 7
bind = $mainMod SHIFT, 8,      movetoworkspace, 8
bind = $mainMod SHIFT, 9,      movetoworkspace, 9
bind = $mainMod SHIFT, 0,      movetoworkspace, 10

# Scroll through workspaces
bind = $mainMod, mouse_down,   workspace, e-1
bind = $mainMod, mouse_up,     workspace, e+1
bind = $mainMod, bracketleft,  workspace, e-1
bind = $mainMod, bracketright, workspace, e+1

# Special workspace (scratchpad)
bind = $mainMod, S,            togglespecialworkspace, magic
bind = $mainMod CTRL, S,       movetoworkspacesilent, special:magic

# Multimedia keys
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1.4 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindl  = , XF86AudioPlay,         exec, playerctl play-pause
bindl  = , XF86AudioNext,         exec, playerctl next
bindl  = , XF86AudioPrev,         exec, playerctl previous
