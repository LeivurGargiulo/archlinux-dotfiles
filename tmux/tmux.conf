# ╔══════════════════════════════════════════════════════════════╗
# ║  tmux.conf — leivur @ gamdias                               ║
# ║  Prefix: C-Space · vi keys · Wayland clipboard             ║
# ╚══════════════════════════════════════════════════════════════╝

# ─── PREFIX ────────────────────────────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ─── GENERAL ───────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",*:Tc"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-titles on
set -g set-titles-string "#S · #W"
set -g escape-time 0
set -g repeat-time 300
set -g history-limit 50000
set -g focus-events on
set -g detach-on-destroy off
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none
set -g allow-rename on
setw -g automatic-rename on

# ─── SPLITS ────────────────────────────────────────────────────
unbind '"'
unbind '%'
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ─── NAVIGATION ────────────────────────────────────────────────
# Panes — vim style
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes — uppercase vim
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Windows
bind -r C-h previous-window
bind -r C-l next-window
bind Tab last-window

# Sessions
bind S choose-session
bind N new-session

# ─── COPY MODE (vi) ────────────────────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v     send-keys -X begin-selection
bind -T copy-mode-vi C-v   send-keys -X rectangle-toggle
bind -T copy-mode-vi y     send-keys -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode-vi q     send-keys -X cancel
bind -T copy-mode-vi H     send-keys -X start-of-line
bind -T copy-mode-vi L     send-keys -X end-of-line
bind P paste-buffer

# ─── RELOAD ────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display-message " Config recargado"

# ─── STATUS BAR ────────────────────────────────────────────────
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-justify left
set -g status-style "bg=#0a0a0a,fg=#888888"

# Left: session name
set -g status-left-length 40
set -g status-left "#[bg=#0a0a0a,fg=#666666] 󱄅 #[fg=#bbbbbb,bold]#S #[fg=#333333] │ "

# Right: time and date
set -g status-right-length 60
set -g status-right "#[fg=#333333]│ #[fg=#666666]%H:%M #[fg=#444444]%d %b"

# Window status
setw -g window-status-format         " #[fg=#4a4a4a]#I #[fg=#555555]#W "
setw -g window-status-current-format " #[bg=#1a1a1a,fg=#ffffff,bold]#I #W #[bg=#0a0a0a] "
setw -g window-status-separator      ""
setw -g window-status-style          "bg=#0a0a0a,fg=#555555"
setw -g window-status-current-style  "bg=#1a1a1a,fg=#ffffff,bold"
setw -g window-status-activity-style "bg=#0a0a0a,fg=#888888"

# Pane borders
set -g pane-border-style        "fg=#222222"
set -g pane-active-border-style "fg=#555555"
set -g pane-border-status       off

# Messages
set -g message-style            "bg=#1a1a1a,fg=#dddddd"
set -g message-command-style    "bg=#1a1a1a,fg=#dddddd"

# Mode (copy mode highlight)
setw -g mode-style "bg=#333333,fg=#ffffff"

# Clock
set -g clock-mode-colour "#ffffff"
set -g clock-mode-style  24

